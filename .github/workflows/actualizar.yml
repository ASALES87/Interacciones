- name: Inyectar datos en Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          try:
              api.upload_file(
                  path_or_fileobj='datos.json',
                  path_in_repo='datos.json',
                  repo_id='Salesao87/dayz-intel-map',
                  repo_type='space',
                  token=os.environ['HF_TOKEN'],
                  commit_message='Update data [Skip LFS]' # Esto ayuda a veces
              )
              print('✅ Sincronizado correctamente')
          except Exception as e:
              print(f'❌ Error: {e}')
              exit(1)
          "
